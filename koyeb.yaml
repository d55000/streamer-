name: streampro
type: web
definition:
  docker:
    dockerfile: Dockerfile
  env:
    - key: NODE_ENV
      value: production
    - key: PORT
      value: "3000"
  ports:
    - port: 3000
      protocol: http
  routes:
    - path: /
      port: 3000
  instance_type: nano
  regions:
    - was
  scaling:
    min: 1
    max: 1
